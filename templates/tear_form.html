<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if modo == 'novo' %}Novo tear{% else %}Editar tear{% endif %} - Sistema de Paradas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #e6e7eb; }

        .header-logo {
            background: #1f2630;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 22px;
        }

        .header-logo img {
            max-width: 100%;
            max-height: 78px;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <header class="header-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Sistemas de Parada dos Teares" />
    </header>

    <main class="container-fluid px-3 px-md-4 pb-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success" role="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="m-0">{% if modo == 'novo' %}Novo tear{% else %}Editar tear{% endif %}</h1>
            <a href="{{ url_for('sistema') }}" class="btn btn-outline-secondary">Voltar para dashboard</a>
        </div>

        <form method="post" action="{% if modo == 'novo' %}{{ url_for('criar_tear') }}{% else %}{{ url_for('atualizar_tear', tear_id=tear['id']) }}{% endif %}">
            <div class="row g-3 mb-2">
                <div class="col-12 col-md-4">
                    <label class="form-label" for="nome">Nome</label>
                    <input id="nome" name="nome" class="form-control" value="{{ tear['nome'] if tear else 'TEAR' }}" required />
                    <small class="text-muted">Nome fixo.</small>
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label" for="numero">Número</label>
                    <input id="numero" name="numero" class="form-control" value="{{ tear['numero'] if tear else '' }}" required />
                </div>
                <div class="col-12">
                    <label class="form-label" for="descricao">Descrição</label>
                    <input id="descricao" name="descricao" class="form-control" value="{{ tear['descricao'] if tear else '' }}" required />
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('teares') }}" class="btn btn-secondary">Voltar para teares</a>
        </form>
    </main>
</body>
</html>
