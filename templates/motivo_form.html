<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if modo == 'novo' %}Novo motivo{% else %}Editar motivo{% endif %} - Sistema de Paradas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #e6e7eb;
        }

        .header-logo {
            background: #1f2630;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 22px;
        }

        .header-logo img {
            max-width: 100%;
            max-height: 78px;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <header class="header-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Sistemas de Parada dos Teares" />
    </header>

    <main class="container-fluid px-3 px-md-4 pb-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success" role="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="m-0">{% if modo == 'novo' %}Novo motivo{% else %}Editar motivo{% endif %}</h1>
            <a href="{{ url_for('sistema') }}" class="btn btn-outline-secondary">Voltar para dashboard</a>
        </div>

        <form method="post" action="{% if modo == 'novo' %}{{ url_for('criar_motivo') }}{% else %}{{ url_for('atualizar_motivo', codigo=motivo['codigo']) }}{% endif %}">
            <div class="row g-3 mb-3">
                <div class="col-12 col-md-3">
                    <label class="form-label" for="codigo">Código</label>
                    <input id="codigo" name="codigo" type="text" inputmode="numeric" maxlength="4" pattern="[0-9]{1,4}" class="form-control" value="{{ motivo['codigo'] if motivo else '' }}" placeholder="0001" required />
                </div>
                <div class="col-12 col-md-9">
                    <label class="form-label" for="descricao">Descrição</label>
                    <input id="descricao" name="descricao" class="form-control" value="{{ motivo['descricao'] if motivo else '' }}" required />
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('motivos') }}" class="btn btn-secondary">Voltar para motivos</a>
        </form>
    </main>
</body>
</html>
