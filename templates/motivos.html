<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motivos - Sistema de Paradas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #e6e7eb;
        }

        .header-logo {
            background: #1f2630;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 22px;
        }

        .header-logo img {
            max-width: 100%;
            max-height: 78px;
            height: auto;
            display: block;
        }

        .title-bar {
            background-color: #0f4d75;
            color: #fff;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 18px;
        }

        .title-text {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        .table > :not(caption) > * > * {
            background-color: #e6e7eb;
        }

        .action-btn {
            min-width: 82px;
        }

        .action-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .filter-card {
            border: 1px solid #cdd3db;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 14px;
            background-color: #f1f3f7;
        }

        .results-info {
            font-size: 0.95rem;
            color: #4b5563;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .title-text {
                font-size: 1.5rem;
            }

            .action-group {
                justify-content: flex-start;
            }

            .filter-card {
                padding: 10px;
            }

            .table {
                font-size: 1rem;
            }

            .table thead {
                display: none;
            }

            .table tbody tr {
                display: block;
                border: 1px solid #cdd3db;
                border-radius: 8px;
                padding: 10px;
                margin-bottom: 10px;
                background: #eef0f4;
            }

            .table tbody td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: 0;
                padding: 6px 0;
                text-align: right;
                gap: 12px;
            }

            .table tbody td::before {
                content: attr(data-label);
                font-weight: 700;
                color: #1f2937;
                text-align: left;
            }

            .table tbody td:last-child {
                display: block;
                padding-top: 10px;
            }

            .table tbody td:last-child::before {
                display: block;
                margin-bottom: 8px;
            }

            .action-group {
                gap: 10px;
                flex-wrap: wrap;
            }

            .action-btn {
                min-width: 112px;
            }
        }
    </style>
</head>
<body>
    <header class="header-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Sistemas de Parada dos Teares" />
    </header>

    <main class="container-fluid px-3 px-md-4 pb-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success" role="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <section class="title-bar d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
            <h1 class="title-text">MOTIVOS</h1>
            <div class="d-flex gap-2">
                <a href="{{ url_for('sistema') }}" class="btn btn-outline-light btn-lg">VOLTAR</a>
                <a href="{{ url_for('novo_motivo') }}" class="btn btn-light btn-lg">ADICIONAR</a>
            </div>
        </section>

        <section>
            <div class="filter-card">
                <label for="descricaoFilter" class="form-label fw-semibold mb-1">Filtrar por descrição</label>
                <input id="descricaoFilter" type="text" class="form-control" placeholder="Digite parte da descrição" autocomplete="off" />
                <div id="resultsInfo" class="results-info" aria-live="polite"></div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered align-middle" id="motivosTable">
                    <thead>
                        <tr>
                            <th style="width: 180px;">Código</th>
                            <th>Descrição</th>
                            <th style="width: 190px;" class="text-end">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for motivo in motivos %}
                            <tr data-descricao="{{ motivo['descricao'] | lower }}">
                                <td data-label="Código">{{ motivo['codigo'] }}</td>
                                <td data-label="Descrição">{{ motivo['descricao'] }}</td>
                                <td data-label="Ações">
                                    <div class="action-group">
                                        <a href="{{ url_for('editar_motivo_form', codigo=motivo['codigo']) }}" class="btn btn-outline-primary action-btn">Editar</a>
                                        <form method="post" action="{{ url_for('excluir_motivo', codigo=motivo['codigo']) }}" onsubmit="return confirm('Deseja excluir este motivo?');">
                                            <button type="submit" class="btn btn-outline-danger action-btn">Excluir</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const descricaoFilterInput = document.getElementById('descricaoFilter');
        const resultsInfo = document.getElementById('resultsInfo');
        const tableRows = Array.from(document.querySelectorAll('#motivosTable tbody tr'));

        function updateResultsInfo(visibleCount, totalCount, filterValue) {
            if (!filterValue) {
                resultsInfo.textContent = `Exibindo ${totalCount} motivo(s).`;
                return;
            }

            resultsInfo.textContent = `Exibindo ${visibleCount} de ${totalCount} motivo(s) para "${filterValue}".`;
        }

        function applyDescricaoFilter() {
            const normalizedFilter = descricaoFilterInput.value.trim().toLowerCase();
            let visibleRows = 0;

            tableRows.forEach((row) => {
                const descricao = row.dataset.descricao || '';
                const shouldShow = descricao.includes(normalizedFilter);
                row.style.display = shouldShow ? '' : 'none';

                if (shouldShow) {
                    visibleRows += 1;
                }
            });

            updateResultsInfo(visibleRows, tableRows.length, descricaoFilterInput.value.trim());
        }

        descricaoFilterInput.addEventListener('input', applyDescricaoFilter);
        applyDescricaoFilter();
    </script>
</body>
</html>
